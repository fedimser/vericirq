name: Continuous integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint (black+mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v1
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          architecture: 'x64'
          cache: 'pip'
      - name: Install requirements
        run: pip install .[dev]
      - name: Lint
        run: ./lint.sh
  pytest-ubuntu:
    strategy:
      matrix:
        python-version: [ '3.11', '3.13' ]
    name: Tests (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v1
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          architecture: 'x64'
          cache: 'pip'
      - name: Install requirements
        run: pip install .[dev]
      - name: Run tests
        run: pytest vericirq
